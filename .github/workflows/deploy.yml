name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Edge-function-only changes don't affect the PWA bundle — skip the Pages
    # rebuild for those (they're handled by deploy-functions.yml). A commit that
    # also touches app code still triggers this (paths-ignore only skips when
    # EVERY changed file matches).
    paths-ignore:
      - 'supabase/**'
  workflow_dispatch:

# Required so the Pages deployment can publish from this workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress runs when a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build (soccer app)
        env:
          # Project Pages live at /<repo-name>/, so Vite needs that as its
          # base path. Derived from the workflow context — no manual config.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── Young Athlete sibling apps (August / Millie / Evie) ────────────
      # One source under youth/, built three times with different
      # VITE_ATHLETE + VITE_BASE_PATH + per-athlete icons. Each kid installs
      # their own URL as a PWA and only sees their own data (rows are
      # filtered by athlete_id). The /youth/ path stays August's so the
      # already-installed PWA keeps working without re-install.
      - name: Install (youth app)
        run: npm ci
        working-directory: youth

      - name: Build (August's app)
        env:
          VITE_ATHLETE: august
          VITE_BASE_PATH: /${{ github.event.repository.name }}/youth/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          cp -f public/icons/august/icon-192.png         public/icon-192.png
          cp -f public/icons/august/icon-512.png         public/icon-512.png
          cp -f public/icons/august/apple-touch-icon.png public/apple-touch-icon.png
          cp -f public/favicon-august.svg                public/favicon.svg
          npm run build
        working-directory: youth

      - name: Nest into dist/youth
        run: |
          mkdir -p dist/youth
          cp -r youth/dist/. dist/youth/
          rm -rf youth/dist

      - name: Build (Millie's app)
        env:
          VITE_ATHLETE: millie
          VITE_BASE_PATH: /${{ github.event.repository.name }}/millie/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          cp -f public/icons/millie/icon-192.png         public/icon-192.png
          cp -f public/icons/millie/icon-512.png         public/icon-512.png
          cp -f public/icons/millie/apple-touch-icon.png public/apple-touch-icon.png
          cp -f public/favicon-millie.svg                public/favicon.svg
          npm run build
        working-directory: youth

      - name: Nest into dist/millie
        run: |
          mkdir -p dist/millie
          cp -r youth/dist/. dist/millie/
          rm -rf youth/dist

      - name: Build (Evie's app)
        env:
          VITE_ATHLETE: evie
          VITE_BASE_PATH: /${{ github.event.repository.name }}/evie/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          cp -f public/icons/evie/icon-192.png         public/icon-192.png
          cp -f public/icons/evie/icon-512.png         public/icon-512.png
          cp -f public/icons/evie/apple-touch-icon.png public/apple-touch-icon.png
          cp -f public/favicon-evie.svg                public/favicon.svg
          npm run build
        working-directory: youth

      - name: Nest into dist/evie
        run: |
          mkdir -p dist/evie
          cp -r youth/dist/. dist/evie/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
