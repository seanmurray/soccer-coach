name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # Edge-function-only changes don't affect the PWA bundle — skip the Pages
    # rebuild for those (they're handled by deploy-functions.yml). A commit that
    # also touches app code still triggers this (paths-ignore only skips when
    # EVERY changed file matches).
    paths-ignore:
      - 'supabase/**'
  workflow_dispatch:

# Required so the Pages deployment can publish from this workflow.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress runs when a new push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build (soccer app)
        env:
          # Project Pages live at /<repo-name>/, so Vite needs that as its
          # base path. Derived from the workflow context — no manual config.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # ── Young Athlete sibling app ──────────────────────────────────────
      # Lives in /youth, shares the same Supabase project, and is published as
      # a sub-route at /<repo-name>/youth/. Built AFTER the soccer app (whose
      # build empties dist/) and copied into dist/youth so both ship in one
      # Pages artifact. The kid installs the /youth/ URL as its own PWA.
      - name: Install (youth app)
        run: npm ci
        working-directory: youth

      - name: Build (youth app)
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/youth/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
        working-directory: youth

      - name: Nest youth build under dist/youth
        run: |
          mkdir -p dist/youth
          cp -r youth/dist/. dist/youth/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
