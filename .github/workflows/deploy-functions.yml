name: Deploy Edge Functions

# Auto-deploy the soccer Supabase edge functions whenever their source changes
# on main. Makes the repo the source of truth: edit supabase/functions/** and
# push — CI deploys. Do NOT also deploy by hand (dashboard/MCP/local CLI) or the
# live functions will drift from git.
#
# REQUIRES one repo secret: SUPABASE_ACCESS_TOKEN
#   Supabase dashboard → Account → Access Tokens → Generate new token,
#   then GitHub repo → Settings → Secrets and variables → Actions →
#   New repository secret → name SUPABASE_ACCESS_TOKEN, paste the value.
# (Until that secret exists this workflow fails fast at the guard step below.)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '!supabase/functions/**/*.md' # doc-only changes shouldn't redeploy
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

# Never cancel an in-flight function deploy; let each finish.
concurrency:
  group: deploy-functions
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      # Project ref of the dedicated soccer project (also in supabase/config.toml).
      # Not a secret — it's already public in the function URLs.
      PROJECT_REF: sxnmxdezkrmtitjlaokq
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it under repo Settings → Secrets and variables → Actions, then re-run."
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        # Deployed explicitly (not "deploy all") so the set is auditable.
        # verify_jwt comes from supabase/config.toml — the single source of
        # truth — so it can't silently flip back on. Add new functions here.
        run: |
          set -euo pipefail
          for fn in push-workout push-biometrics claude-proxy; do
            echo "::group::deploy $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            echo "::endgroup::"
          done

      - name: Summary
        if: success()
        run: |
          {
            echo "### Edge functions deployed ✅"
            echo ""
            echo "Project: \`$PROJECT_REF\`"
            echo "- push-workout"
            echo "- push-biometrics"
            echo "- claude-proxy"
            echo ""
            echo "_Secrets (SHORTCUTS_API_KEY, ANTHROPIC_API_KEY) persist across deploys — not touched._"
          } >> "$GITHUB_STEP_SUMMARY"
